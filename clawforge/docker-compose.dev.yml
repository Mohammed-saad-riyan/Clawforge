version: "3.9"

# Development override - use with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# Optimized for Apple Silicon (no GPU reservations)

services:
  web:
    build:
      target: development
    command: pnpm dev
    environment:
      - WATCHPACK_POLLING=true

  api:
    build:
      target: development
    command: uv run uvicorn clawforge.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - API_DEBUG=true

  ollama:
    # Remove GPU reservations for Apple Silicon
    deploy: {}
    # Pull the model on first run
    entrypoint: >
      sh -c "ollama serve &
             sleep 5 &&
             ollama pull qwen2.5-coder:7b &&
             wait"
